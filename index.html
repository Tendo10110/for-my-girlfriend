<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Secure Connection To My Heart</title>
    <style>
        /* Romantic Gradient Background */
        body {
            background: linear-gradient(135deg, #ffe6e6 0%, #ffb3b3 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* Card Container */
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            margin: 20px;
        }

        /* Animated Heart */
        .heart {
            color: #ff4d4d;
            font-size: 50px;
            animation: pulse 1.5s infinite;
            display: inline-block;
            margin-bottom: 10px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #ff3333;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* Your Picture Styling */
        .couple-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        .message {
            font-size: 16px;
            line-height: 1.6;
            color: #444;
            margin-bottom: 25px;
        }

        /* Interactive Button */
        .btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 77, 77, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background-color: #e62e2e;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 77, 77, 0.6);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">❤️</div>
        <h1>To my Mamiiii!</h1>
        <div class="subtitle">You're connected to my heart</div>
       
        <!-- This displays your photo -->
        <img src="us.jpg" alt="Us" class="couple-img">

        <div class="message">
            <p>Dli na man ko technician nga wire akong ihatag, karun inani nasad para ma iba haha   </p>
            <p>ikaw ray maka connect sa akong heart wla nay lain MWAAHAHA</p>
        </div>

        <!-- A cute interactive button she can press -->
        <button class="btn" onclick="alert('❤️ Access Granted! I love you infinitely! ❤️')">Accept My Love</button>
    </div>

</body>
</html>
